<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Glow -->
  <circle cx="50" cy="50" r="32" fill="rgba(191, 85, 236, 0.15)" filter="blur(5px)" />
  
  <!-- Left Side: Red/Pink O Symbol (representing opponent) -->
  <circle cx="30" cy="50" r="16" fill="none" stroke="#ff2a5f" stroke-width="6" />
  
  <!-- Right Side: Cyan/Blue X Symbol (representing player) -->
  <path d="M 68 34 L 88 66 M 88 34 L 68 66" stroke="#00d2ff" stroke-width="6" stroke-linecap="round" />
  
  <!-- Middle: Bold Transition Arrow -->
  <g stroke="#ffd32a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 46 50 L 58 50" />
    <path d="M 54 44 L 60 50 L 54 56" />
  </g>
