<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bombGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0512" />
      <stop offset="100%" stop-color="#040914" />
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="50" cy="55" r="32" fill="rgba(255, 42, 95, 0.15)" filter="blur(5px)" />
  <!-- Bomb body -->
  <circle cx="50" cy="55" r="30" fill="url(#bombGrad)" stroke="#ff2a5f" stroke-width="3" />
  <circle cx="42" cy="47" r="6" fill="rgba(255, 255, 255, 0.15)" />
  <!-- Fuse Cap -->
  <path d="M 58 32 L 68 22" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <rect x="52" y="28" width="10" height="6" transform="rotate(-45 57 31)" fill="#0c203c" stroke="#ffffff" stroke-width="2" />
  <!-- Spark fuse line -->
  <path d="M 68 22 Q 78 18 80 10" fill="none" stroke="#ffd32a" stroke-width="3" stroke-dasharray="4 2" stroke-linecap="round" />
  <!-- Spark rays -->
  <path d="M 80 10 L 86 4 M 80 10 L 88 12 M 80 10 L 74 16 M 80 10 L 72 6 M 80 10 L 82 18" stroke="#ffd32a" stroke-width="3" stroke-linecap="round" />
</svg>
