<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Snowflake shards -->
  <circle cx="50" cy="50" r="32" fill="rgba(0, 210, 255, 0.1)" filter="blur(5px)" />
  <!-- Center hub -->
  <circle cx="50" cy="50" r="8" fill="#040914" stroke="#00d2ff" stroke-width="3" />
  <!-- 6 main branches -->
  <g stroke="#00d2ff" stroke-width="3" stroke-linecap="round">
    <!-- Verticals -->
    <line x1="50" y1="18" x2="50" y2="82" />
    <!-- Diagonals -->
    <line x1="22" y1="34" x2="78" y2="66" />
    <line x1="22" y1="66" x2="78" y2="34" />
  </g>
  <!-- V-ticks on branches -->
  <g stroke="#00d2ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top branch ticks -->
    <path d="M 44 26 L 50 20 L 56 26" />
    <path d="M 42 34 L 50 28 L 58 34" />
    <!-- Bottom branch ticks -->
    <path d="M 44 74 L 50 80 L 56 74" />
    <path d="M 42 66 L 50 72 L 58 66" />
    <!-- Top-Right branch ticks -->
    <path d="M 68 32 L 74 36 L 70 42" />
    <!-- Bottom-Left branch ticks -->
    <path d="M 32 68 L 26 64 L 30 58" />
    <!-- Top-Left branch ticks -->
    <path d="M 32 32 L 26 36 L 30 42" />
    <!-- Bottom-Right branch ticks -->
    <path d="M 68 68 L 74 64 L 70 58" />
  </g>
</svg>
